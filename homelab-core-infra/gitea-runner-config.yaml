# gitea/act_runner config. Mountado em /config/config.yaml no container
# (env CONFIG_FILE), aplica-se na primeira boot. Sobrepõe-se aos defaults.
#
# Notes:
#   - capacity > 1 paraleliza matrix jobs (CPU compartilhado com OO,
#     Gitea, iedora-web na mesma Beelink — 3 é o equilibrio para um
#     N100 8-core).
#   - cache.dir vive no volume `gitea_runner_data` (persistente).
#     actions/cache@v4 talks ao server interno via ACTIONS_CACHE_URL
#     injectado automaticamente.
#   - valid_volumes whitelist permite workflows montar /var/cache/buildx
#     no host (buildx local cache pattern para Docker builds).

log:
  level: info

runner:
  file: /data/.runner
  capacity: 3
  fetch_timeout: 5s
  fetch_interval: 2s
  timeout: 1h
  shutdown_timeout: 30s
  insecure: false

cache:
  enabled: true
  dir: /data/cache
  host: ""        # auto-detected
  port: 0         # auto-allocated

container:
  privileged: false
  # 4 cpus + 3 GB por job × capacity 3 = 12 cpus + 9 GB cap total.
  # Beelink N100 = 4 cores físicos + 16 GB → cada job consegue saturar
  # os 4 cores quando corre sozinho; quando há concorrência o kernel
  # time-slica. Run de parallel workspaces dentro do job é capped pelo
  # próprio runner (scripts/run-parallel.mjs lê availableParallelism()
  # que respeita o cgroup --cpus, evitando over-subscription).
  options: "--cpus=4 --memory=3g"
  valid_volumes:
    - /var/cache/buildx
    - /var/cache/bun
    - /data/cache

host: {}
