# Reusable workflow: one Vitest job for one workspace.
#
# Invoked from ci.yml's matrix-style job list with two inputs: a human
# label for the job name and the workdir to `cd` into before running
# `bun run test`. Adding another product = one new `uses:` block in
# ci.yml — no new file, no copy-pasted setup.

name: Unit

on:
  workflow_call:
    inputs:
      label:
        description: 'Display name for the job (e.g. "menu", "@iedora/identity").'
        type: string
        required: true
      workdir:
        description: 'Repo-relative path to the workspace to test.'
        type: string
        required: true
      timeout-minutes:
        description: 'Per-job timeout. Override for slower suites.'
        type: number
        required: false
        default: 10

jobs:
  test:
    name: ${{ inputs.label }}
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout-minutes }}
    # `ubuntu-24.04` ships Docker Engine, which testcontainers needs for
    # menu's real-Redis integration suite. No extra setup step required.
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run Vitest
        # `bun run test` invokes the `vitest` binary whose Node shebang
        # takes over, so testcontainers' `@testcontainers/*` modules run
        # under Node here (they fail under Bun's runtime — oven-sh/bun#21342).
        run: bun run test
