# Reusable workflow: menu's Playwright e2e suite.
#
# Owns Postgres 18 + LocalStack service containers, the build-time env
# block (GENKAN_* and friends), the Next.js + Playwright caches, and
# the Playwright report uploads.
#
# All env literals live here — ci.yml passes nothing through except
# inherited secrets. Adding a new e2e-relevant env var = one-line edit
# in this file.

name: E2E

on:
  workflow_call:
    secrets:
      BETTER_AUTH_SECRET:
        description: 'Server-side auth signing secret. CI value can be any 32+ byte string.'
        required: true

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    defaults:
      run:
        working-directory: products/menu

    services:
      # The service container starts with the default `postgres` admin DB —
      # globalSetup connects there to CREATE the `metamenu_test` DB before
      # migrations run.
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      # LocalStack stands in for MinIO/S3 in CI: GH Actions services don't
      # accept `command:` overrides (so `minio/minio` can't boot), and both
      # the `minio/minio` and `bitnami/minio` public images were removed
      # from Docker Hub in 2025. LocalStack auto-boots S3 on :4566; the
      # SDK works as long as `forcePathStyle: true` (already set in
      # src/features/upload/adapters/s3.ts).
      localstack:
        image: localstack/localstack:4
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - '4566:4566'
        options: >-
          --health-cmd "curl -fsS http://localhost:4566/_localstack/health | grep -q 's3'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    env:
      # --- Database + auth ---
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/metamenu_test
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:3000
      DISABLE_AUTH_RATE_LIMIT: 'true'
      DISABLE_RATE_LIMIT: 'true'

      # --- S3 (LocalStack) ---
      # LocalStack accepts any credentials; we use the conventional `test/test`
      # pair the AWS SDK uses for local development.
      S3_ENDPOINT: http://localhost:4566
      S3_REGION: us-east-1
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      S3_BUCKET: metamenu-test

      # --- Genkan (the auth-testkit shim) ---
      # Next 16's "collect page data" build pass executes module-level env
      # validation (src/shared/env.ts), so GENKAN_* must be present at BUILD
      # time as well as at webServer runtime. These values pass Zod; the
      # actual issuer URL is resolved by playwright.config.ts's webServer.
      # NEXT_PUBLIC_GENKAN_URL is also inlined into the client bundle at
      # build time via src/shared/brand.ts::GENKAN_URL, so it MUST be the
      # final testkit URL the browser hits. SHIM_PORT in playwright.config.ts
      # must match the port suffix here.
      GENKAN_OAUTH_CLIENT_ID: menu
      GENKAN_OAUTH_CLIENT_SECRET: menu-secret
      GENKAN_ISSUER_URL: http://127.0.0.1:4444
      NEXT_PUBLIC_GENKAN_URL: http://127.0.0.1:4444

      # --- Misc ---
      NEXT_TELEMETRY_DISABLED: '1'
      CI: 'true'
      PLAYWRIGHT_VERSION: '1.59.1'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: ./.github/actions/setup

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          # Turbopack's persistent cache lives here in Next 16 — large
          # saving on warm runs. Keying on source files invalidates when
          # code changes. Path is repo-root-relative; `actions/cache`
          # doesn't honour the job's `defaults.run.working-directory`.
          path: products/menu/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('products/menu/src/**/*.ts', 'products/menu/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers (cold cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (warm cache)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE metamenu_test;"

      - name: Bootstrap S3 bucket
        # LocalStack starts with zero buckets. `aws` CLI v2 is preinstalled
        # on ubuntu-24.04 runners; no install step needed.
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://metamenu-test
          aws --endpoint-url=http://localhost:4566 s3api put-bucket-acl \
            --bucket metamenu-test --acl public-read

      - name: Build Next.js
        # Node, not Bun — production runtime parity + AGENTS.md guidance.
        # `node --run` is the Node 22+ way to invoke a package.json script.
        run: node --run build

      - name: Run Playwright
        # playwright.config.ts skips its own `build` step when CI=true,
        # so this only launches `next start` + runs the suite.
        run: bunx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: products/menu/playwright-report/
          retention-days: 7

      - name: Upload traces, screenshots, and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: products/menu/test-results/
          retention-days: 14
