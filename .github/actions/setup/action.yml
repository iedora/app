# Composite action: workspace setup.
#
# Installs Bun and resolves every workspace via `bun install --frozen-lockfile`
# at the repo root. Callers handle `actions/checkout` themselves (so this
# action stays usable from any working-directory).
#
# This is THE one place setup gets defined — every job that needs deps
# delegates to it. Bumping Bun, or adding a cache layer, is a one-file edit.
#
# Pattern reference: t3-oss/create-t3-turbo `tooling/github/setup/action.yml`.

name: 'Setup workspace'
description: 'Install Bun and resolve every Bun workspace from the repo root.'

inputs:
  bun-version:
    description: 'Bun version to install. Pin matches AGENTS.md.'
    required: false
    default: '1.3.13'

runs:
  using: composite
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install workspace dependencies
      # `working-directory` for `uses:` steps doesn't honour the caller's
      # `defaults.run.working-directory`, but `run:` steps inside a composite
      # action DO inherit the caller's default. Pin to `github.workspace`
      # so the install always runs at the repo root regardless of caller.
      shell: bash
      working-directory: ${{ github.workspace }}
      run: bun install --frozen-lockfile
