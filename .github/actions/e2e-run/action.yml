# Composite action: E2E run.
#
# Shared Playwright harness for products that serve through `apps/web`
# (the Next.js shell). Each product declares its own `services` (Postgres
# ± S3Mock) and `matrix.shard` in the workflow job; this action runs the
# common pipeline.
#
# Pipeline steps:
#   1. Wait for S3Mock + create bucket (only if needs_s3mock: true)
#   2. Apply core DB migrations (always — runs migrate.mjs against core_test)
#   3. Apply product DB migrations (bun run db:migrate:test; skipped if
#      needs_product_migrations: false — core piggybacks on @iedora/auth's
#      schema)
#   4. Install Playwright browsers
#   5. Build apps/web (production, using product's .env.test)
#   6. Run Playwright specs
#   7. Upload HTML report artifact
#
# The core DB step (2) uses `packages/auth/scripts/migrate.mjs` — a
# self-healing script that creates the `core_test` database if it doesn't
# exist, then applies the better-auth schema. Every product needs this
# because the Next.js server initializes better-auth in-process at startup.
#
# Every product that runs E2E needs:
#   1. A `playwright.config.ts` at the product root (webServer →
#      `../../apps/web`).
#   2. A `.env.test` with CORE_DATABASE_URL, IEDORA_CORE_SECRET, and (if
#      needed) DATABASE_URL + S3_*.
#   3. Scripts in package.json: `test:e2e` (and `db:migrate:test` if
#      the product owns Drizzle migrations).
#   4. An `e2e` job in its CI workflow that calls this action after
#      typecheck + lint + unit.
#
# See docs/testing/e2e-architecture.md for the full contract.

name: 'E2E run'
description: 'Shared Playwright harness — services, migrations, build, specs, report.'

inputs:
  product:
    description: 'Product name (menu, core). Used for artifact naming.'
    required: true
  working_directory:
    description: 'Path from repo root to the product directory.'
    required: true
  db_name:
    description: 'Postgres database name for the test DB.'
    required: true
  needs_s3mock:
    description: 'Whether the product uses S3 uploads and needs the s3mock service.'
    default: 'false'
  needs_product_migrations:
    description: "Whether to run the product's db:migrate:test script. Set false for products that piggyback on @iedora/auth's schema (core)."
    default: 'true'
  shard:
    description: 'Current shard index (e.g. 1/2). Forwarded to Playwright --shard.'
    default: '1/1'
  grep_invert:
    description: 'Pattern passed to --grep-invert (e.g. @flaky).'
    default: '@flaky'

runs:
  using: composite
  steps:
    - name: Wait for S3Mock + create bucket
      if: inputs.needs_s3mock == 'true'
      shell: bash
      run: bash "${GITHUB_WORKSPACE}/.github/scripts/wait-s3mock.sh"

    - name: Apply DB migrations
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      run: bun run db:migrate:test

    - name: Install Playwright browsers
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      run: bunx playwright install --with-deps chromium

    - name: Build apps/web (production)
      shell: bash
      working-directory: ${{ github.workspace }}/apps/web
      run: bun --env-file=../../${{ inputs.working_directory }}/.env.test next build

    - name: Run Playwright
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      env:
        CI: 'true'
      run: bun run test:e2e -- --grep-invert "${{ inputs.grep_invert }}" --shard=${{ inputs.shard }}

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ inputs.product }}-${{ inputs.shard }}
        path: ${{ inputs.working_directory }}/playwright-report
        retention-days: 14
