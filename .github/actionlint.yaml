# actionlint config — whitelista labels do self-hosted runner.
#
# Mesmo migrámos de GitHub Actions para Gitea Actions, o actionlint
# binário tem hard-coded as labels conhecidas do GitHub. Custom labels
# do nosso runner (act_runner em homelab-core-infra/) precisam de ser
# declaradas aqui para o pre-commit hook + lint workflow não falsharem.
#
# Convenção: cada label aqui mapeia para um docker image em
# GITEA_RUNNER_LABELS no docker-compose.yml. Manter sync.

self-hosted-runner:
  labels:
    - bun-debian
