# osv-scanner config — supressões de CVEs known + tracked.
# Cada entry tem rationale + data de review obrigatória.
#
# Regra do projecto: nada deve ficar suprimido sem rationale claro e
# revisão trimestral. Se ao chegar à review_date o CVE não foi resolvido
# upstream, re-avalia se o risk continua aceitável OU se mudamos de
# dependency.

[[IgnoredVulns]]
id = "GHSA-67mh-4wv8-2f99"
ignoreUntil = 2026-08-28T00:00:00Z  # review trimestral (RFC3339)
reason = """
esbuild 0.18.20 CORS bypass no dev server.

Chain: drizzle-kit@0.31.10 → @esbuild-kit/esm-loader@2.6.5 →
@esbuild-kit/core-utils@3.3.2 → esbuild@0.18.20.

@esbuild-kit foi descontinuado pelos autores em 2024 (substituído por
`tsx`), drizzle-kit ainda não migrou (open PR — drizzle-team/drizzle-orm#3001).

Risk: drizzle-kit é dev-only (CLI para gerar migrations + push); não
corre esbuild dev server. A vuln só explora se um endpoint do esbuild
dev server estiver exposto, o que nunca acontece — drizzle-kit usa
esbuild como bundler do próprio CLI.

Action: monitor drizzle-kit releases; PR upstream tracked em
drizzle-team/drizzle-orm#3001.
"""

